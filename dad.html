<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini CM風 音声生成プレイヤー</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background-color: #f4f6f9;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        max-width: 450px;
        width: 100%;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #2c3e50;
      }
      .cm-text {
        background: #222;
        color: #fff;
        padding: 20px;
        border-radius: 8px;
        text-align: left;
        font-size: 1.2rem;
        line-height: 1.8;
        margin-bottom: 20px;
        font-weight: bold;
        letter-spacing: 0.1em;
        white-space: pre-line;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }
      label {
        display: block;
        font-size: 0.85rem;
        color: #7f8c8d;
        margin-bottom: 5px;
      }
      input[type="password"] {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      button {
        background-color: #9b59b6;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #8e44ad;
      }
      button:disabled {
        background-color: #bdc3c7;
        cursor: not-allowed;
      }
      .status {
        margin-top: 15px;
        font-size: 0.9rem;
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gemini 生音声合成</h1>

      <div class="cm-text">俺が、がん。
しかも、喉に。
45歳で。
嘘やろ。</div>

      <div class="input-group">
        <label for="apiKey">Gemini API Key (Google AI Studioで取得):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." />
      </div>

      <button id="playBtn" onclick="generateSpeech()">Geminiの声を聞く</button>

      <div id="status" class="status"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
